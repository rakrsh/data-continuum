global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics # Assuming standard metrics path if integrated

  - job_name: 'ml'
    static_configs:
      - targets: ['ml:8001']
    metrics_path: /metrics
