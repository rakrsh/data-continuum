# PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-continuum.fullname" . }}-postgres
  labels:
    {{- include "data-continuum.labels" . | nindent 4 }}
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "data-continuum.selectorLabels" . | nindent 6 }}
      component: postgres
  template:
    metadata:
      labels:
        {{- include "data-continuum.selectorLabels" . | nindent 8 }}
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.postgres.host }}
  labels:
    {{- include "data-continuum.labels" . | nindent 4 }}
    component: postgres
spec:
  ports:
    - port: 5432
  selector:
    {{- include "data-continuum.selectorLabels" . | nindent 4 }}
    component: postgres
---
