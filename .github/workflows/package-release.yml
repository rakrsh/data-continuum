name: Package Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  package-linux:
    name: Package Docker & Kubernetes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Version
        run: echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

      - name: Create Version File
        run: |
          echo "Project: Data-Continuum" > VERSION.txt
          echo "Version: ${{ env.VERSION }}" >> VERSION.txt
          echo "Build-Date: $(date -u)" >> VERSION.txt
          echo "Git-SHA: ${{ github.sha }}" >> VERSION.txt

      - name: Package Docker Compose
        run: |
          mkdir -p dist/docker-compose
          cp VERSION.txt dist/docker-compose/
          cp docker-compose.yml dist/docker-compose/
          cp .env.example dist/docker-compose/ || touch dist/docker-compose/.env.example
          cp -r api ui ml seeder airflow observability dist/docker-compose/
          cd dist && zip -r ../data-continuum-${{ env.VERSION }}-docker-compose.zip docker-compose/

      - name: Package Kubernetes (Helm)
        run: |
          mkdir -p dist/kubernetes
          cp VERSION.txt dist/kubernetes/
          cp -r deploy/kubernetes/helm dist/kubernetes/
          cd dist && zip -r ../data-continuum-${{ env.VERSION }}-kubernetes.zip kubernetes/

      - name: Upload Linux Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            data-continuum-${{ env.VERSION }}-docker-compose.zip
            data-continuum-${{ env.VERSION }}-kubernetes.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-windows:
    name: Package Windows (Compiled)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.ps1 | iex

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Build API with Nuitka
        run: uv run python -m nuitka --standalone --onefile --output-dir=build --output-filename=data-continuum-api.exe --assume-yes-for-downloads api/main.py

      - name: Build ML with Nuitka
        run: uv run python -m nuitka --standalone --onefile --output-dir=build --output-filename=data-continuum-ml.exe --assume-yes-for-downloads ml/main.py

      - name: Create Version File
        run: |
          $Version = "${{ github.event.release.tag_name }}"
          $Content = @"
          Project: Data-Continuum
          Version: $Version
          Build-Date: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          Git-SHA: ${{ github.sha }}
          "@
          $Content | Out-File -FilePath VERSION.txt -Encoding utf8

      - name: Package Windows Artifact
        run: |
          $Version = "${{ github.event.release.tag_name }}"
          New-Item -ItemType Directory -Path dist/windows
          Copy-Item VERSION.txt dist/windows/
          Copy-Item build/*.exe dist/windows/
          Copy-Item -Recurse deploy/windows dist/windows/
          Copy-Item -Recurse scripts dist/windows/
          Compress-Archive -Path dist/windows/* -DestinationPath data-continuum-$Version-windows.zip

      - name: Upload Windows Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: data-continuum-${{ github.event.release.tag_name }}-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
