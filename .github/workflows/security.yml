name: Security and License Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit pip-licenses

    - name: Generate Consolidated Requirements
      run: |
        cat api/requirements.txt ml/requirements.txt seeder/requirements.txt | sort -u > all_requirements.txt
        # Install them to make sure pip-licenses can analyze them
        pip install -r all_requirements.txt || true

    - name: Run Vulnerability Scan
      run: |
        pip-audit -r all_requirements.txt -f json -o vulnerability-report.json || true
        pip-audit -r all_requirements.txt || true

    - name: Run License Check
      run: |
        pip-licenses --format=json --output-file=license-report.json || true
        pip-licenses || true

    - name: Show Reports in Run Logs
      run: |
        echo "=== Vulnerability Report ==="
        cat vulnerability-report.json || echo "No vulnerability report generated"
        echo "=== License Report ==="
        cat license-report.json || echo "No license report generated"

    - name: Upload Reports Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: security-and-license-reports
        path: |
          vulnerability-report.json
          license-report.json
