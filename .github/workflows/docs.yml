name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Build and Deploy Documentation
        uses: rakrsh/central-actions/doc-build-deploy@main
        with:
          doc-build-command: "pipx install uv && uv venv && source .venv/bin/activate && uv pip install -e .[docs] && mkdocs build"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy: "true"
