site_name: Data-Continuum Documentation
site_description: A production-grade data pipeline sandbox for Smart Logistics.
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Services:
    - Ingestion: services/ingestion.md
    - Unified API: services/api.md
    - ML Service: services/ml.md
  - Orchestration: orchestration.md
  - Observability: observability.md
  - Deployment:
      - Kubernetes: deployment/kubernetes.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["api", "ml", "seeder", "airflow/dags"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
